<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>春声 2026 · Primavera Sound</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0E1017;--bg2:#141720;--bg3:#1A1E2A;
  --line:#252A38;--text:#E8E0CC;--muted:#5A6070;--dim:#353B4A;
}
body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;font-size:13px;min-height:100vh}

/* ── HEADER ── */
#hdr{position:sticky;top:0;z-index:200;background:var(--bg2);border-bottom:1px solid var(--line)}
.brand{padding:12px 16px 8px;display:flex;align-items:flex-start;justify-content:space-between}
.brand-left .eyebrow{font-size:9px;letter-spacing:.3em;color:var(--muted);text-transform:uppercase;margin-bottom:3px}
.brand-title{font-family:'DM Serif Display',serif;font-size:20px;letter-spacing:-.02em;line-height:1}
.brand-title .acc{color:#F5C842}
.view-toggle{display:flex;gap:4px;margin-top:2px}
.vt{background:var(--bg3);color:var(--muted);border:1px solid var(--line);border-radius:5px;padding:5px 9px;font-size:10px;font-family:'DM Mono',monospace;cursor:pointer;transition:all .15s;white-space:nowrap}
.vt.on{background:#F5C842;color:#000;border-color:#F5C842}

/* day tabs */
#dtabs{display:flex;overflow-x:auto;scrollbar-width:none;background:var(--bg2)}
#dtabs::-webkit-scrollbar{display:none}
.dtab{flex-shrink:0;background:none;border:none;border-bottom:2px solid transparent;color:#3A3A3A;padding:8px 13px;cursor:pointer;font-family:'DM Mono',monospace;text-align:left;transition:all .15s}
.dtab.on{color:var(--text)}
.dtab .dl{font-size:12px;font-weight:500}
.dtab .ds{font-size:9px;margin-top:1px}

/* ── VIEWS ── */
.view{display:none}
.view.on{display:block}

/* ── SCHEDULE ── */
#fbar{padding:10px 14px 9px;background:#0F1219;border-bottom:1px solid #1E2330}
.dbadge{display:inline-block;border-radius:4px;padding:2px 10px;font-size:10px;letter-spacing:.04em;margin-bottom:9px;border:1px solid transparent}
.sfilters{display:flex;gap:5px;flex-wrap:wrap}
.sfbtn{border-radius:20px;padding:3px 10px;font-size:10px;border:1px solid transparent;cursor:pointer;font-family:'DM Mono',monospace;transition:all .15s;white-space:nowrap}
.sfbtn.all{background:#1C2030;color:#666;border-color:#2A3040}
.sfbtn.all.on{background:var(--text);color:#000}
#slist{padding-bottom:20px;background:var(--bg)}
.si{display:flex;align-items:center;gap:11px;padding:10px 16px;border-bottom:1px solid #191E2A;background:var(--bg);position:relative;overflow:hidden}
.hlbar{position:absolute;left:0;top:0;bottom:0;width:3px}
.stime{min-width:46px}
.tstart{font-size:15px;font-weight:500;font-variant-numeric:tabular-nums;line-height:1}
.tend{font-size:9px;color:var(--dim);margin-top:2px}
.tlate{font-size:8px;color:#3A3A3A;margin-top:1px}
.spill{border-radius:3px;padding:2px 6px;font-size:8px;letter-spacing:.03em;border:1px solid transparent;white-space:nowrap;flex-shrink:0}
.sartist{flex:1;min-width:0}
.aname{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.2}
.hllabel{font-size:8px;letter-spacing:.12em;margin-top:3px;opacity:.7}

/* ── A-Z ── */
#azlist{padding-bottom:20px;background:var(--bg)}
.azletter{padding:5px 16px;background:#0C0F18;border-bottom:1px solid #1A1E2A;font-size:10px;color:var(--muted);letter-spacing:.2em;position:sticky;top:0;z-index:10}
.azitem{display:flex;align-items:center;gap:10px;padding:9px 16px;border-bottom:1px solid #191E2A;background:var(--bg)}
.azitem .aname{font-size:13px;color:#C0B8A8;flex:1}
.aztime{font-size:11px;color:var(--muted);font-variant-numeric:tabular-nums;white-space:nowrap}

/* ── MAP ── */
#mapview{padding:10px 0 60px;background:var(--bg)}
.map-hint{font-size:10px;color:var(--muted);text-align:center;padding:6px 16px 10px;letter-spacing:.05em}
.map-wrap{position:relative;width:100%;overflow:hidden}
#mapimg{width:100%;display:block;user-select:none}

/* clickable hotspots overlay */
.hs{position:absolute;cursor:pointer;border-radius:6px;border:2px solid transparent;transition:all .2s;display:flex;align-items:center;justify-content:center}
.hs:hover{border-color:rgba(255,255,255,.5)}
.hs.selected{border-color:#F5C842;box-shadow:0 0 0 3px rgba(245,200,66,.25)}
.hs-label{font-size:8px;font-family:'DM Mono',monospace;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.9);background:rgba(0,0,0,.55);border-radius:3px;padding:1px 4px;pointer-events:none;white-space:nowrap}

/* stage popup */
#stagepop{display:none;margin:10px 14px;background:var(--bg3);border:1px solid var(--line);border-radius:10px;overflow:hidden}
.pop-head{padding:12px 14px 10px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
.pop-stage{font-size:14px;font-weight:500}
.pop-close{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;line-height:1;padding:0 2px}
.pop-shows{padding:6px 0 4px}
.pop-show{display:flex;align-items:center;gap:10px;padding:7px 14px;border-bottom:1px solid #1A1E2A}
.pop-show:last-child{border-bottom:none}
.pop-time{font-size:12px;color:var(--muted);min-width:40px;font-variant-numeric:tabular-nums}
.pop-artist{font-size:13px;color:var(--text)}
.pop-artist.hl{font-weight:500}
.pop-empty{padding:16px;font-size:11px;color:var(--muted);text-align:center}

.foot{padding:14px 16px;font-size:9px;color:#2E3444;text-align:center;letter-spacing:.05em}
</style>
</head>
<body>

<div id="hdr">
  <div class="brand">
    <div class="brand-left">
      <div class="eyebrow">Barcelona · Parc del Fòrum · Junio 2026</div>
      <div class="brand-title"><span class="acc">春声</span> PRIMAVERA</div>
    </div>
    <div class="view-toggle">
      <button class="vt on" onclick="setView('schedule')">排班</button>
      <button class="vt" onclick="setView('az')">A–Z</button>
      <button class="vt" onclick="setView('map')">地图</button>
    </div>
  </div>
  <div id="dtabs"></div>
</div>

<!-- SCHEDULE VIEW -->

  <div id="fbar"></div>
  <div id="slist"></div>
</div>

</div>

function toMins(t){const[h,m]=t.split(':').map(Number);return h<8?h*60+m+1440:h*60+m}

let curDay='thu', curView='schedule', curStage=null, curHs=null;

/* ── DAY TABS ── */
function renderDayTabs(){
  document.getElementById('dtabs').innerHTML=DAYS.map(d=>{
    const on=d.key===curDay;
    return `<button class="dtab${on?' on':''}" onclick="setDay('${d.key}')"
      style="${on?'border-bottom-color:'+d.bc+';color:var(--text)':''}">
      <div class="dl">${d.label}</div>
      <div class="ds" style="color:${on?d.bc:'#333'}">${d.sub}</div>
    </button>`;
  }).join('');
}

/* ── SCHEDULE ── */
function renderSchedule(){
  const day=DAYS.find(d=>d.key===curDay);
  const stages=[...new Set(day.shows.map(s=>s.stage))];
  const shows=curStage?day.shows.filter(s=>s.stage===curStage):day.shows;
  const sorted=[...shows].sort((a,b)=>toMins(a.time)-toMins(b.time));

  // filter bar
  const cnt=shows.length;
  document.getElementById('fbar').innerHTML=`
    <div class="dbadge" style="background:${day.bc}18;border-color:${day.bc}33;color:${day.bc}">★ ${day.badge}</div>
    <div class="sfilters">
      <button class="sfbtn all${!curStage?' on':''}" onclick="setStage(null)">全部 (${cnt})</button>
      ${stages.map(s=>{
        const si=ST[s];if(!si)return'';
        const on=curStage===s;
        return `<button class="sfbtn" onclick="setStage('${s.replace(/'/g,"\\'")}')"
          style="background:${on?si.color:'#1C2030'};color:${on?'#000':si.color};border-color:${si.color}33">
          ${si.e} ${si.s}</button>`;
      }).join('')}
    </div>`;

  // list
  document.getElementById('slist').innerHTML=sorted.map(show=>{
    const si=ST[show.stage]||{color:'#888',bg:'#11111140',e:'🎵',s:'?'};
    const m=toMins(show.time);
    const late=m>=1440,vl=m>=1440+180;
    const tc=vl?'#444':late?'#666':'#DDD';
    return `<div class="si" style="background:${show.hl?si.bg:'#0E1017'}">
      ${show.hl?`<div class="hlbar" style="background:${si.color}"></div>`:''}
      <div class="stime" style="padding-left:${show.hl?'5px':'0'}">
        <div class="tstart" style="color:${tc}">${show.time}</div>
        <div class="tend">–${show.end}</div>
        ${vl?'<div class="tlate">凌晨</div>':''}
      </div>
      <div class="spill" style="background:${si.color}18;border-color:${si.color}44;color:${si.color}">${si.e} ${si.s}</div>
      <div class="sartist">
        <div class="aname" style="font-size:${show.hl?'15px':'13px'};font-weight:${show.hl?500:400};color:${show.hl?si.color:'#B8B0A0'}">${show.artist}</div>
        ${show.hl?`<div class="hllabel" style="color:${si.color}99">HEADLINER</div>`:''}
      </div>
    </div>`;
  }).join('')+`<div class="foot">数据来源 Clashfinder · ${day.shows.length} 场演出</div>`;
}

/* ── A-Z ── */
function renderAZ(){
  const day=DAYS.find(d=>d.key===curDay);
  const sorted=[...day.shows].sort((a,b)=>a.artist.toLowerCase().localeCompare(b.artist.toLowerCase()));
  let html='',lastL='';
  sorted.forEach(show=>{
    const si=ST[show.stage]||{color:'#888',e:'🎵',s:'?'};
    const l=show.artist[0].toUpperCase().replace(/[^A-Z]/,'#');
    if(l!==lastL){html+=`<div class="azletter">${l}</div>`;lastL=l;}
    html+=`<div class="azitem">
      <div class="spill" style="background:${si.color}18;border-color:${si.color}44;color:${si.color}">${si.e} ${si.s}</div>
      <div class="aname${show.hl?' hl':''}" style="color:${show.hl?si.color:'#C0B8A8'}">${show.artist}</div>
      <div class="aztime">${show.time}</div>
    </div>`;
  });
  html+=`<div class="foot">${day.shows.length} 场演出 · ${day.label}</div>`;
  document.getElementById('azlist').innerHTML=html;
}

/* ── MAP ── */
function renderMap(){
  const day=DAYS.find(d=>d.key===curDay);
  document.getElementById('mapfoot').textContent=day.label+' · 点击舞台查看演出';

  // build hotspots
  const wrap=document.getElementById('mapwrap');
  // remove old hotspots
  wrap.querySelectorAll('.hs').forEach(el=>el.remove());

  Object.entries(HOTSPOTS).forEach(([stage,[l,t,w,h]])=>{
    const si=ST[stage];if(!si)return;
    const hasShows=day.shows.some(s=>s.stage===stage);
    const el=document.createElement('div');
    el.className='hs';
    el.style.cssText=`left:${l}%;top:${t}%;width:${w}%;height:${h}%;
      background:${hasShows?si.color+'22':'rgba(0,0,0,0)'};
      border-color:${hasShows?si.color+'66':'transparent'}`;
    el.innerHTML=`<div class="hs-label" style="color:${si.color}">${si.e} ${si.s}</div>`;
    if(hasShows){
      el.onclick=()=>openStagePop(stage);
    }
    wrap.appendChild(el);
  });

  // clear popup
  const pop=document.getElementById('stagepop');
  pop.style.display='none';
  curHs=null;
}

function openStagePop(stage){
  const day=DAYS.find(d=>d.key===curDay);
  const si=ST[stage];
  const shows=day.shows.filter(s=>s.stage===stage).sort((a,b)=>toMins(a.time)-toMins(b.time));

  // highlight hotspot
  document.querySelectorAll('.hs').forEach(el=>el.classList.remove('selected'));
  const hsList=document.querySelectorAll('.hs');
  hsList.forEach(el=>{if(el.querySelector('.hs-label')?.textContent.includes(si.s))el.classList.add('selected')});

  const pop=document.getElementById('stagepop');
  pop.style.display='block';
  pop.innerHTML=`
    <div class="pop-head">
      <div class="pop-stage" style="color:${si.color}">${si.e} ${stage}</div>
      <button class="pop-close" onclick="closePop()">×</button>
    </div>
    <div class="pop-shows">
      ${shows.length?shows.map(s=>`
        <div class="pop-show">
          <div class="pop-time">${s.time}</div>
          <div class="pop-artist${s.hl?' hl':''}" style="color:${s.hl?si.color:'var(--text)'}">${s.artist}${s.hl?' ★':''}</div>
        </div>`).join('')
        :`<div class="pop-empty">今天暂无演出</div>`}
    </div>`;
  pop.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function closePop(){
  document.getElementById('stagepop').style.display='none';
  document.querySelectorAll('.hs').forEach(el=>el.classList.remove('selected'));
}

/* ── STATE ── */
function setDay(k){
  curDay=k;curStage=null;curHs=null;
  renderDayTabs();
  if(curView==='schedule')renderSchedule();
  else if(curView==='az')renderAZ();
  else renderMap();
  window.scrollTo({top:0,behavior:'smooth'});
}

function setStage(s){
  curStage=s;
  renderSchedule();
}

function setView(v){
  curView=v;curStage=null;
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('on'));
  document.getElementById('v'+v).classList.add('on');
  document.querySelectorAll('.vt').forEach(el=>el.classList.remove('on'));
  event.target.classList.add('on');
  if(v==='schedule')renderSchedule();
  else if(v==='az')renderAZ();
  else renderMap();
}

// init
renderDayTabs();
renderSchedule();
